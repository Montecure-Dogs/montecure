<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - montecure.dogs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sage: {
              50: '#F5F6F5',
              100: '#E6E9E6',
              200: '#CDD3CE',
              300: '#A9B3AA',
              400: '#819083',
              500: '#647466',
              600: '#4E5C50',
              700: '#404B42',
              800: '#353E36',
              900: '#2E352F',
            },
            terracotta: {
              50: '#FAF4F0',
              100: '#F3E5DC',
              200: '#E6C6B3',
              300: '#D59F81',
              400: '#C27552',
              500: '#B65D39',
              600: '#A34B2E',
              700: '#873C27',
              800: '#6E3222',
              900: '#5A2A1E',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-stone-50 text-sage-900 font-sans">
  <nav class="fixed w-full bg-white border-b border-sage-100 z-40">
    <div class="container mx-auto px-6">
      <div class="flex justify-between items-center py-5">
        <div class="flex items-center space-x-3">
          <div class="w-10 h-10 rounded-xl bg-sage-600 flex items-center justify-center text-white">
            <i class="fas fa-dog text-lg text-terracotta-200"></i>
          </div>
          <span class="text-2xl font-black text-sage-800">montecure<span class="text-terracotta-500">.dogs</span></span>
        </div>
        <div class="hidden md:flex items-center space-x-8">
          <a href="/" class="text-sage-600 hover:text-terracotta-600 font-semibold">Home</a>
          <a href="/admin" class="text-terracotta-600 font-semibold">Admin</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="pt-32 pb-24 min-h-screen">
    <div class="container mx-auto px-6">
      <div id="loading" class="text-center py-20">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-sage-100 mb-4">
          <i class="fas fa-spinner fa-spin text-2xl text-sage-600"></i>
        </div>
        <p class="text-sage-600 text-lg">Loading...</p>
      </div>

      <div id="error" class="hidden max-w-2xl mx-auto">
        <div class="bg-red-50 border-2 border-red-200 rounded-2xl p-8 text-center">
          <div class="w-16 h-16 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-exclamation-triangle text-2xl text-red-500"></i>
          </div>
          <h2 class="text-2xl font-bold text-red-800 mb-2">Authentication Error</h2>
          <p id="error-message" class="text-red-600"></p>
        </div>
      </div>

      <div id="unauthenticated" class="hidden max-w-md mx-auto">
        <div class="bg-white rounded-2xl border border-sage-100 shadow-sm p-8 text-center">
          <div class="w-20 h-20 rounded-full bg-sage-100 flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-lock text-3xl text-sage-400"></i>
          </div>
          <h2 class="text-2xl font-bold text-sage-900 mb-2">Admin Access Required</h2>
          <p class="text-sage-600 mb-8">Please log in to view and manage your upcoming walks.</p>
          <button id="login-btn" class="w-full bg-terracotta-500 text-white px-6 py-3 rounded-xl hover:bg-terracotta-600 transition font-bold">
            Login
          </button>
        </div>
      </div>
    </div>
  </div>

  <footer class="bg-sage-900 text-white py-12">
    <div class="container mx-auto px-6">
      <div class="text-center text-xs text-sage-500 space-y-2">
        <p>© 2026 montecure.dogs. All rights reserved.</p>
        <a href="#" id="reset-session" class="text-sage-400 hover:text-terracotta-400 underline">Reset Session</a>
      </div>
    </div>
  </footer>

  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_dGhhbmtmdWwtc2hhcmstNDguY2xlcmsuYWNjb3VudHMuZGV2JA"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
    onload="initClerk()"
  ></script>

  <script>
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const unauthenticated = document.getElementById('unauthenticated');
    const errorMessage = document.getElementById('error-message');
    const loginBtn = document.getElementById('login-btn');
    const resetSessionBtn = document.getElementById('reset-session');

    function showView(view) {
      loading.classList.add('hidden');
      error.classList.add('hidden');
      unauthenticated.classList.add('hidden');
      view.classList.remove('hidden');
    }

    function resetSession() {
      localStorage.clear();
      sessionStorage.clear();
      document.cookie.split(";").forEach(function(c) {
        document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
      });
      location.reload();
    }

    resetSessionBtn.addEventListener('click', (e) => {
      e.preventDefault();
      resetSession();
    });

    loginBtn.addEventListener('click', () => {
      if (window.Clerk) {
        window.Clerk.redirectToSignIn();
      }
    });

    async function initClerk() {
      try {
        await window.Clerk.load();

        if (window.Clerk.user) {
          location.href = '/admin/app';
          return;
        }

        showView(unauthenticated);
      } catch (err) {
        console.error('Authentication error:', err);
        errorMessage.textContent = `An error occurred: ${err.message}`;
        showView(error);
      }
    }

    // Fallback: if Clerk doesn't load within 5 seconds, show error
    setTimeout(() => {
      if (!window.Clerk) {
        console.error('Clerk SDK failed to load');
        errorMessage.textContent = "Authentication service failed to load. Please refresh the page.";
        showView(error);
      }
    }, 5000);
  </script>
</body>
</html>
